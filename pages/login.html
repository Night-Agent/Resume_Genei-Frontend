<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Resume Optimizer</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../styles-additional.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header will be loaded here -->
    <div id="header-placeholder"></div>

    <!-- Login Section -->
    <section class="auth-section">
        <div class="container">
            <div class="auth-container">
                <div class="auth-header">
                    <h2>Welcome Back</h2>
                    <p>Login to continue optimizing your resume</p>
                </div>
                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <div class="form-options">
                        <label class="checkbox">
                            <input type="checkbox" id="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn-submit">Login</button>
                    <div class="divider">
                        <span>OR</span>
                    </div>
                    <button type="button" class="btn-social">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M18 10C18 5.58172 14.4183 2 10 2C5.58172 2 2 5.58172 2 10C2 13.9932 4.92547 17.3135 8.75 17.9V12.5H7V10H8.75V8C8.75 6.25 9.85 5.25 11.45 5.25C12.2 5.25 13 5.4 13 5.4V7H12.1C11.2 7 10.9 7.55 10.9 8.15V10H12.9L12.55 12.5H10.9V17.9C14.7245 17.3135 18 13.9932 18 10Z" fill="#1877F2"/>
                        </svg>
                        Continue with Google
                    </button>
                    <p class="signup-link">Don't have an account? <a href="signup.html">Sign up</a></p>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer will be loaded here -->
    <div id="footer-placeholder"></div>

    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/loader.js"></script>
</body>
</html>
