<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previous Reports - Resume Screening System</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../styles-additional.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <div id="header-placeholder"></div>

    <!-- Previous Reports Section -->
    <section class="reports-section">
        <div class="container">
            <div class="reports-header">
                <div>
                    <h1>Previous Reports</h1>
                    <p>View your past resume analysis reports</p>
                </div>
                <button class="btn-primary" onclick="window.location.href='upload.html'">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10 3v14M3 10h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    New Analysis
                </button>
            </div>

            <!-- Filter and Search -->
            <div class="reports-toolbar">
                <div class="search-box">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="8" cy="8" r="6" stroke="#6b7280" stroke-width="2"/>
                        <path d="M12.5 12.5L17 17" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <input type="text" placeholder="Search by job role..." id="searchInput">
                </div>
                <div class="filter-group">
                    <label>Sort by:</label>
                    <select id="sortSelect">
                        <option value="recent">Most Recent</option>
                        <option value="oldest">Oldest First</option>
                        <option value="score-high">Highest Score</option>
                        <option value="score-low">Lowest Score</option>
                    </select>
                </div>
            </div>

            <!-- Reports Grid -->
            <div class="reports-grid" id="reportsGrid">
                <div class="loading-placeholder">Loading reports...</div>
            </div>

            <!-- Empty State (Hidden initially) -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="20" y="30" width="80" height="70" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
                    <path d="M35 50h50M35 65h40M35 80h30" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="85" cy="25" r="15" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
                    <path d="M85 17v16M77 25h16" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <h3>No Reports Yet</h3>
                <p>Upload your resume and analyze it against job descriptions to see reports here.</p>
                <button class="btn-primary" onclick="window.location.href='upload.html'">
                    Upload Resume
                </button>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="../js/loader.js"></script>
    <script src="../js/previous-reports.js"></script>
</body>
</html>
